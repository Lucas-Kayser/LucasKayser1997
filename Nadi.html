<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏟️ النادي - مهرجان الكرازة 2026</title>
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/NgKMPBgm/logo.jpg">
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #78350f, #d97706);
            --bg-color: #f9f5ee;
            --card-bg: #ffffff;
            --text-main: #1c1917;
            --border-color: #e7e5e4;
        }
        html.dark {
            --bg-color: #0c0904;
            --card-bg: rgba(17, 24, 39, 0.85);
            --text-main: #f9fafb;
            --border-color: rgba(255, 255, 255, 0.08);
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            direction: rtl; color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        .app-header {
            background: var(--primary-grad);
            color: white; text-align: center;
            padding: 30px 20px 25px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 10px 25px rgba(120, 53, 15, 0.3);
            position: relative;
        }
        .header-content {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 15px; max-width: 800px; margin: 0 auto;
        }
        .header-logo {
            width: 100px; height: 100px; border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            object-fit: cover; margin-bottom: 15px;
            animation: logoEntrance 1.2s cubic-bezier(0.175,0.885,0.32,1.275) both,
                       pulseLogo 3s 1.2s infinite ease-in-out;
            cursor: pointer; transition: transform 0.3s;
        }
        .header-logo:hover { animation-play-state: paused; transform: scale(1.15) rotate(5deg) !important; }
        @keyframes logoEntrance {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes pulseLogo {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 15px rgba(255,255,255,0.7)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
        }
        .app-header h1 { margin: 0; font-size: 26px; font-weight: 800; animation: pulseHeader 3s infinite ease-in-out; }
        .app-header p { margin: 5px 0 0; font-size: 14px; opacity: 0.9; }
        @keyframes pulseHeader { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }

        .countdown-banner {
            background: rgba(255,255,255,0.15); backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.25);
            max-width: 600px; margin: 15px auto 0;
            padding: 8px 15px; border-radius: 30px;
            font-size: 13.5px; font-weight: 700; color: #fff;
            display: flex; align-items: center; justify-content: center;
            flex-wrap: wrap; gap: 6px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .countdown-timer {
            background: #ffffff; color: #78350f;
            padding: 2px 10px; border-radius: 20px;
            font-family: monospace, system-ui; font-size: 14.5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .main-container {
            max-width: 900px; margin: 30px auto;
            padding: 0 20px;
        }
        .nav-scroller { width: 100%; margin-bottom: 20px; }
        .days-grid {
            background: var(--card-bg); padding: 8px; border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
        }
        html.dark .days-grid { box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .day-tab {
            background: #f8fafc; border: none;
            padding: 10px 18px; border-radius: 12px;
            font-size: 14px; font-weight: 700; color: #78350f;
            cursor: pointer;
            transition: transform 0.1s ease, background 0.2s, color 0.2s, box-shadow 0.2s;
            display: flex; align-items: center; gap: 4px;
        }
        html.dark .day-tab { background: rgba(255,255,255,0.06); color: #fde68a; }
        .day-tab:hover { transform: translateY(-2px); }
        .day-tab.active {
            background: var(--primary-grad); color: white;
            box-shadow: 0 6px 15px rgba(120,53,15,0.4);
            animation: buttonShake 0.3s ease-in-out;
        }
        @keyframes buttonShake {
            0%,100% { transform: scale(1); }
            25% { transform: scale(0.9) rotate(-3deg); }
            50% { transform: scale(1.05) rotate(3deg); }
            75% { transform: scale(0.95) rotate(-1deg); }
        }
        .day-content { display: none; }
        .day-content.active { display: block; }
        .empty-day-msg {
            text-align: center; background: var(--card-bg);
            padding: 40px 20px; border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            border: 2px dashed #d97706; color: #92400e;
            font-size: 16px; font-weight: 600;
        }
        html.dark .empty-day-msg { border-color: rgba(217,119,6,0.4); color: #fde68a; }
        .accordion-container { display: flex; flex-direction: column; gap: 15px; }
        .acc-card {
            background: var(--card-bg); border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            transition: transform 0.15s cubic-bezier(0.25,1,0.5,1), box-shadow 0.15s;
        }
        html.dark .acc-card { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        .acc-trigger {
            width: 100%; background: none; border: none;
            padding: 18px 20px; color: white;
            font-size: 17px; font-weight: 700; text-align: right;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: opacity 0.2s ease;
        }
        .acc-trigger:hover { opacity: 0.95; }
        .acc-icon { font-size: 14px; transition: transform 0.3s ease; }
        .acc-card.active .acc-icon { transform: rotate(180deg); }
        .bg-zone-nadi { background: var(--primary-grad); }
        .zone-body { padding: 20px; position: relative; z-index: 2; }
        .acc-content {
            max-height: 0; overflow: hidden;
            transition: max-height 0.35s ease-in-out;
            background: var(--card-bg); position: relative;
        }
        .acc-content::before {
            content: ""; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 180px; height: 180px;
            background-image: url('https://i.ibb.co/NgKMPBgm/logo.jpg');
            background-size: contain; background-repeat: no-repeat;
            background-position: center;
            opacity: 0.035; pointer-events: none; z-index: 1;
        }
        .acc-card.active .acc-content { max-height: 2000px; }
        .location-section {
            margin-bottom: 15px; background: rgba(248,250,252,0.9);
            backdrop-filter: blur(2px); border-radius: 12px;
            padding: 15px; border-right: 4px solid #d97706;
            position: relative; z-index: 2;
        }
        html.dark .location-section { background: rgba(255,255,255,0.04); }
        .location-section:last-child { margin-bottom: 0; }
        .location-title {
            font-size: 15px; font-weight: 700; margin: 0 0 10px;
            color: #0f172a; display: flex; align-items: center; gap: 6px;
        }
        html.dark .location-title { color: #e2e8f0; }
        .activity-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid #e2e8f0;
            font-size: 13.5px;
        }
        html.dark .activity-item { border-bottom-color: rgba(255,255,255,0.08); }
        .activity-item:last-child { border-bottom: none; }
        .activity-name { color: #334155; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        html.dark .activity-name { color: #cbd5e1; }
        .activity-time {
            background: #ffffff; color: #78350f;
            padding: 4px 10px; border-radius: 8px;
            font-size: 12px; font-weight: 600;
            border: 1px solid #fed7aa;
            display: flex; align-items: center; gap: 4px; white-space: nowrap;
        }
        html.dark .activity-time { background: rgba(217,119,6,0.2); color: #fde68a; border-color: rgba(255,255,255,0.1); }
        .footer-note {
            text-align: center; margin: 30px auto;
            max-width: 800px; font-size: 15px; font-weight: 700; color: #92400e;
        }
        html.dark .footer-note { color: #fde68a; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
            color: white; padding: 8px 18px; border-radius: 25px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            text-decoration: none; transition: background 0.2s; margin-bottom: 10px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.35); }
        .notes-section { max-width: 900px; margin: 0 auto 30px; padding: 0 20px; }
        .notes-card {
            background: var(--card-bg); border-radius: 18px;
            padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.07);
            border: 1px solid var(--border-color);
        }
        .notes-title { font-size: 15px; font-weight: 700; color: var(--text-main); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .notes-textarea {
            width: 100%; min-height: 90px; border-radius: 10px;
            border: 1px solid var(--border-color); padding: 10px 12px;
            font-size: 14px; font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text-main); background: #fffbeb;
            resize: vertical; outline: none;
            box-sizing: border-box; direction: rtl;
            transition: border-color 0.2s, background 0.3s;
        }
        html.dark .notes-textarea { background: rgba(255,255,255,0.05); }
        .notes-textarea:focus { border-color: #d97706; background: #fff; }
        .notes-saved-hint { font-size: 11.5px; color: #94a3b8; margin-top: 5px; text-align: left; }
        .theme-toggle-switch {
            width: 76px; height: 36px; background: rgba(255,255,255,0.2);
            border-radius: 30px; border: 1.5px solid rgba(255,255,255,0.4);
            position: relative; cursor: pointer; display: flex; align-items: center;
            justify-content: space-between; padding: 0 8px; backdrop-filter: blur(8px);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .theme-toggle-switch .switch-icon { font-size: 1rem; user-select: none; }
        .theme-toggle-switch .switch-handle {
            position: absolute; top: 3px; right: 3px;
            width: 27px; height: 27px; background: #ffffff; border-radius: 50%;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        html.dark .theme-toggle-switch { background: rgba(17,24,39,0.6); }
        html.dark .theme-toggle-switch .switch-handle { transform: translateX(-40px); background: #38bdf8; }
        .header-controls { position: absolute; top: 15px; left: 20px; z-index: 1000; }
        .share-btn {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.18); color: white;
            border: 1.5px solid rgba(255,255,255,0.4);
            padding: 7px 16px; border-radius: 30px;
            font-size: 13px; font-weight: 700; cursor: pointer;
            backdrop-filter: blur(6px);
            transition: background 0.2s, transform 0.15s;
            margin-top: 10px; font-family: inherit;
        }
        .share-btn:hover { background: rgba(255,255,255,0.28); transform: scale(1.04); }
        .share-menu {
            display: none; position: absolute;
            top: calc(100% + 8px); left: 50%; transform: translateX(-50%);
            background: var(--card-bg); border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden; z-index: 200; min-width: 200px;
        }
        .share-menu.open { display: block; }
        .share-menu-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 18px; font-size: 14px; font-weight: 600;
            color: var(--text-main); cursor: pointer; transition: background 0.15s;
            border-bottom: 1px solid var(--border-color);
        }
        .share-menu-item:last-child { border-bottom: none; }
        .share-menu-item:hover { background: rgba(217,119,6,0.07); }
        /* SEARCH */
        .search-wrap { padding: 12px 16px 0; max-width: 800px; margin: 0 auto; }
        .search-wrap-inner { position: relative; cursor: pointer; }
        .search-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 14px 16px;
            display: flex; align-items: center; gap: 14px;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .search-card:hover { border-color: #d97706; box-shadow: 0 4px 16px rgba(217,119,6,0.15); }
        .search-card-icon {
            width: 42px; height: 42px; border-radius: 12px;
            background: #fef3c7;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 20px;
        }
        html.dark .search-card-icon { background: rgba(217,119,6,0.2); }
        .search-card-body { flex: 1; }
        .search-card-title { font-size: 14px; font-weight: 700; color: var(--text-main); margin: 0 0 2px; }
        .search-card-sub { font-size: 12px; color: #888; margin: 0; }
        .search-card-arrow { font-size: 18px; color: #d97706; }
        .search-results-overlay {
            display: none; position: relative; z-index: 100;
            max-width: 800px; margin: 8px auto 0; padding: 0 16px;
        }
        .search-results-box {
            background: var(--card-bg); border-radius: 16px;
            overflow-y: auto; max-height: 60vh;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        .search-result-item {
            padding: 12px 18px; cursor: pointer;
            border-bottom: 1px solid var(--border-color); transition: background 0.15s;
        }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background: rgba(217,119,6,0.07); }
        .sri-name { font-weight: 700; font-size: 14px; color: var(--text-main); }
        .sri-loc  { font-size: 12px; color: #888; margin-top: 2px; }
        .sri-time { font-size: 12px; color: #d97706; font-weight: 600; margin-top: 2px; }
        html.dark .sri-time { color: #fde68a; }
        .sri-day-badge {
            display: inline-block; background: rgba(217,119,6,0.1); color: #d97706;
            font-size: 11px; font-weight: 700;
            padding: 2px 8px; border-radius: 10px; margin-bottom: 4px;
        }
        html.dark .sri-day-badge { background: rgba(253,230,138,0.15); color: #fde68a; }
        .search-no-results { text-align: center; padding: 30px; color: #888; font-size: 15px; }
        @keyframes ptrSpin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* ===== ANIMATIONS FROM MALAK ===== */
        .emoji-container {
                    position: fixed;
                    top: 0; left: 0;
                    width: 100%; height: 100%;
                    pointer-events: none;
                    z-index: 9999;
                }
        
                        .floating-emoji {
                    position: absolute;
                    font-size: 38px;
                    user-select: none;
                    pointer-events: none;
                }
        
                /* ① مطر من فوق */
                .anim-rain { animation: animRain 2.2s ease-in forwards; }
                @keyframes animRain {
                    0%   { transform: translateY(-80px) scaleY(1.3);  opacity: 0; }
                    8%   { opacity: 1; }
                    100% { transform: translateY(110vh)  scaleY(1);   opacity: 0; }
                }
        
                /* ② موجة من اليسار */
                .anim-wave { animation: animWave 2.8s cubic-bezier(0.4,0,0.2,1) forwards; }
                @keyframes animWave {
                    0%   { transform: translateX(-80px) translateY(0px);            opacity: 0; }
                    8%   { opacity: 1; }
                    25%  { transform: translateX(25vw)  translateY(-30px); }
                    50%  { transform: translateX(50vw)  translateY(20px); }
                    75%  { transform: translateX(75vw)  translateY(-15px); }
                    100% { transform: translateX(110vw) translateY(0px);             opacity: 0; }
                }
        
                /* ③ انفجار من المنتصف */
                .anim-burst { animation: animBurst 2s ease-out forwards; }
                @keyframes animBurst {
                    0%   { transform: translate(var(--bx,0), var(--by,0)) scale(0.2); opacity: 0; }
                    15%  { opacity: 1; transform: translate(var(--bx,0), var(--by,0)) scale(1.3); }
                    100% { transform: translate(var(--ex,50px), var(--ey,-200px)) scale(0.5); opacity: 0; }
                }
        
                /* ④ دوامة صاعدة */
                .anim-spiral { animation: animSpiral 3s ease-in-out forwards; }
                @keyframes animSpiral {
                    0%   { transform: translateY(0)     rotate(0deg)   scale(0.5); opacity: 0; }
                    10%  { opacity: 1; }
                    25%  { transform: translateY(-25vh) rotate(120deg) scale(1.1); }
                    50%  { transform: translateY(-55vh) rotate(240deg) scale(0.9); }
                    75%  { transform: translateY(-80vh) rotate(360deg) scale(1); }
                    100% { transform: translateY(-115vh) rotate(480deg) scale(0.4); opacity: 0; }
                }
        
                /* ⑤ رياح من اليمين */
                .anim-wind { animation: animWind 2.5s cubic-bezier(0.4,0,0.6,1) forwards; }
                @keyframes animWind {
                    0%   { transform: translateX(80px) translateY(0px) rotate(0deg);   opacity: 0; }
                    8%   { opacity: 1; }
                    30%  { transform: translateX(-30vw) translateY(-20px) rotate(-15deg); }
                    60%  { transform: translateX(-65vw) translateY(15px)  rotate(10deg); }
                    100% { transform: translateX(-115vw) translateY(-5px) rotate(-5deg); opacity: 0; }
                }
        
                /* ⑥ نيازك قطرية */
                .anim-meteor { animation: animMeteor 1.8s ease-in forwards; }
                @keyframes animMeteor {
                    0%   { transform: translate(-60px, -60px) scale(1.5) rotate(45deg); opacity: 0; }
                    10%  { opacity: 1; }
                    100% { transform: translate(115vw, 115vh) scale(0.3) rotate(45deg);  opacity: 0; }
                }
        
    </style>

<style>
@keyframes glowFade {
    0%   { box-shadow: 0 0 0px 0px rgba(255,240,100,0); opacity:0; }
    15%  { box-shadow: 0 0 120px 80px rgba(255,240,80,1), 0 0 220px 140px rgba(255,210,30,0.7), 0 0 320px 200px rgba(255,180,0,0.35); opacity:1; }
    100% { box-shadow: 0 0 0px 0px rgba(255,240,100,0); opacity:0; }
}
@keyframes logoBright2 {
    0%   { filter: brightness(1) drop-shadow(0 0 0px rgba(255,240,80,0)); }
    15%  { filter: brightness(2.0) drop-shadow(0 0 40px rgba(255,240,80,1)) drop-shadow(0 0 80px rgba(255,200,0,0.8)); }
    100% { filter: brightness(1) drop-shadow(0 0 0px rgba(255,240,80,0)); }
}
@keyframes rayBurst {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(0.5); }
    15%  { opacity:0.7; transform:translate(-50%,-50%) scale(1.6); }
    100% { opacity:0; transform:translate(-50%,-50%) scale(2.8); }
}
#angel-rays {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:120px; height:120px;
    border-radius:50%;
    pointer-events:none; z-index:0; opacity:0;
    background: radial-gradient(circle, rgba(255,240,100,0.6) 0%, rgba(255,210,30,0.3) 40%, transparent 70%);
}
</style>
</head>
<body>

    <!-- Pull to Refresh Indicator -->
    <div id="emojiContainer" class="emoji-container"></div>
    <div id="ptr-indicator" style="
        position:fixed; top:0; left:0; right:0; height:0px;
        overflow:hidden; background:var(--primary-grad);
        display:flex; align-items:center; justify-content:center;
        gap:8px; z-index:99998; transition:none;">
        <span id="ptr-icon" style="font-size:20px;color:white;display:inline-block;transition:transform 0.15s,color 0.15s;">🔄</span>
        <div id="ptr-spinner" style="display:none;width:20px;height:20px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:ptrSpin 0.7s linear infinite;"></div>
        <span id="ptr-label" style="font-size:13px;font-weight:700;color:white;font-family:inherit;">اسحب للتحديث</span>
    </div>

    <header class="app-header">
        <div class="header-controls">
            <div class="theme-toggle-switch" id="themeToggleSwitch">
                <span class="switch-icon">🌙</span>
                <span class="switch-icon">☀️</span>
                <div class="switch-handle"></div>
            </div>
        </div>
        <div class="header-content">
            <div style="position:relative;display:inline-block;overflow:visible;">
            <div id="angel-rays"></div>
            <canvas id="angel-fireworks" style="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:99999;"></canvas>
            <div id="angel-glow" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;border-radius:50%;z-index:1;pointer-events:none;opacity:0;background:transparent;"></div>
            <img src="https://i.ibb.co/NgKMPBgm/logo.jpg" alt="شعار" class="header-logo" id="angel-logo"
                style="width:120px;height:120px;border-radius:50%;object-fit:cover;display:block;position:relative;z-index:2;opacity:1;" />
            </div>
            <a href="index.html" class="back-btn">🏠 الرئيسية</a>
            <h1 id="mainTitle">🏟️ النادي - دور الملاك ميخائيل</h1>
            <p>جدول أنشطة النادي - مهرجان الكرازة 2026</p>
            <div id="tu-btn-anchor"></div>
            <div style="position:relative;display:inline-block;">
                <button class="share-btn" id="shareBtn">📤 شارك الجدول</button>
                <div class="share-menu" id="shareMenu">
                    <div class="share-menu-item" id="waShareBtn">💬 واتساب</div>
                    <div class="share-menu-item" id="copyShareBtn">🔗 انسخ الرابط</div>
                </div>
            </div>
        </div>
        <div class="countdown-banner" id="countdownBanner">
            <span id="timerDisplay">⏳ جاري الحساب...</span>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="search-wrap">
        <div class="search-wrap-inner">
            <div class="search-card" id="searchCard">
                <div class="search-card-icon">🔍</div>
                <input id="searchBoxReal" type="search" placeholder="ابحث عن نشاط في النادي..." autocomplete="off"
                    style="flex:1;border:none;outline:none;font-size:14px;font-family:inherit;background:transparent;color:var(--text-main);direction:rtl;min-width:0;">
                <span id="searchCloseBtn" style="font-size:18px;cursor:pointer;opacity:0;padding:0 4px;transition:opacity 0.2s;"
                    onclick="document.getElementById('searchBoxReal').value='';document.getElementById('searchOverlay').style.display='none';document.getElementById('searchResultsBox').innerHTML='';this.style.opacity='0';">✕</span>
            </div>
        </div>
    </div>
    <div class="search-results-overlay" id="searchOverlay">
        <div class="search-results-box" id="searchResultsBox"></div>
    </div>

    <!-- Day Tabs -->
    <div class="nav-scroller">
        <nav class="days-grid">
            <button class="day-tab" data-day="sun">☀️ الأحد</button>
            <button class="day-tab" data-day="mon">🌙 الاثنين</button>
            <button class="day-tab" data-day="tue">🔥 الثلاثاء</button>
            <button class="day-tab" data-day="wed">💧 الأربعاء</button>
            <button class="day-tab" data-day="thu">🌾 الخميس</button>
            <button class="day-tab" data-day="fri">⛪ الجمعة</button>
            <button class="day-tab" data-day="sat">🎉 السبت</button>
        </nav>
    </div>

    <div class="main-container">
        <div id="dynamic-schedule"></div>
    </div>

    <!-- ===== DATA FETCH — النادي ===== -->
    <script>
    (function() {
        const SHEET_ID   = '12q0UrY9EpXAXAPiFwzBwfha4MBklaQHPXmWWO7Tmljw';
        const DAYS = [
            { key: 'sun', gid: '850760714', label: 'الأحد ☀️'      },
            { key: 'mon', gid: '932787312',  label: 'الاثنين 🌙'    },
            { key: 'tue', gid: '1503210940',  label: 'الثلاثاء 🔥'   },
            { key: 'wed', gid: '1910930279',  label: 'الأربعاء 💧'   },
            { key: 'thu', gid: '1245396104',  label: 'الخميس 🌾'     },
            { key: 'fri', gid: '677980056', label: 'الجمعة ⛪'     },
            { key: 'sat', gid: '981087448',  label: 'السبت 🎉'      },
        ];

        const TARGET_ROOM  = 'النادي';   // اسم الغرفة اللي بندور عليها في الـ Sheet
        const TIME_LABELS  = ['9:00 ص','10:00 ص','11:00 ص','12:00 ظ','1:00 م','2:00 م','3:00 م','4:00 م','5:00 م','6:00 م','7:00 م','8:00 م','9:00 م','10:00 م'];
        const COL_START    = 2;
        const COL_END      = 14;

        async function fetchDay(gid) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}&headers=1`;
            const text = await fetch(url).then(r => r.text());
            const json = JSON.parse(text.substring(47).slice(0,-2));
            return json.table;
        }

        function getCellValue(cell) {
            if (!cell || cell.v === null || cell.v === undefined) return '';
            return String(cell.v).trim();
        }

        // ⭐ parseRows محدّث يفهم هيكل دور الملاك:
        //    - اسم القاعة في cells[0]، cells[1] فاضي
        //    - بيدور على "النادي" في cells[0] أو cells[1]
        function parseRows(table) {
            const rows = table.rows || [];
            const locations = [];
            let currentZone = '';

            for (let ri = 0; ri < rows.length; ri++) {
                const row   = rows[ri];
                const cells = row.c || [];

                let zoneVal = getCellValue(cells[0]);
                let roomVal = getCellValue(cells[1]);

                // هيكل دور الملاك: اسم القاعة في cells[0]، cells[1] فاضي
                if (!roomVal && zoneVal) {
                    // نعامل cells[0] كاسم قاعة
                    roomVal  = zoneVal;
                    zoneVal  = 'NADI_FLOOR';
                }

                if (zoneVal) currentZone = zoneVal;

                // نفلتر بس على النادي
                if (!roomVal.includes(TARGET_ROOM)) continue;

                const activities = [];
                let prevActivity = null, startCol = -1;

                for (let ci = COL_START; ci <= Math.min(COL_END, cells.length - 1); ci++) {
                    const v = getCellValue(cells[ci]);
                    if (v) {
                        if (prevActivity === v) {
                            // نفس النشاط بيكمّل
                        } else {
                            if (prevActivity !== null) {
                                const s = TIME_LABELS[startCol - COL_START] || '';
                                const e = TIME_LABELS[ci - COL_START]      || '';
                                activities.push({ name: prevActivity, time: s && e ? `⏰ ${s} — ${e}` : '' });
                            }
                            prevActivity = v;
                            startCol = ci;
                        }
                    } else {
                        if (prevActivity !== null) {
                            const s = TIME_LABELS[startCol - COL_START] || '';
                            const e = TIME_LABELS[ci - COL_START]      || '';
                            activities.push({ name: prevActivity, time: s && e ? `⏰ ${s} — ${e}` : '' });
                            prevActivity = null;
                        }
                    }
                }
                if (prevActivity !== null) {
                    const s = TIME_LABELS[startCol - COL_START]                           || '';
                    const e = TIME_LABELS[Math.min(COL_END, cells.length-1) - COL_START + 1] || '';
                    activities.push({ name: prevActivity, time: s && e ? `⏰ ${s} — ${e}` : '' });
                }

                // نضيف الصف حتى لو ما فيهوش أنشطة (بناءً على طلب المستخدم)
                locations.push({ roomLabel: roomVal, activities });
            }
            return locations;
        }

        function buildDayHTML(locations, dayKey) {
            let html = `<div id="${dayKey}" class="day-content">\n<div class="accordion-container">\n`;

            if (locations.length === 0) {
                // النادي مش موجود في الـ Sheet لهذا اليوم — بنعرضه فاضي
                html += `
                <div class="acc-card active">
                    <button class="acc-trigger bg-zone-nadi">
                        <span>🏟️ ${TARGET_ROOM}</span><span class="acc-icon">▼</span>
                    </button>
                    <div class="acc-content"><div class="zone-body">
                        <div class="empty-day-msg">📭 لا توجد أنشطة مسجلة لهذا اليوم</div>
                    </div></div>
                </div>`;
            } else {
                locations.forEach(loc => {
                    const borderColor = '#d97706';
                    let activitiesHTML;
                    if (loc.activities.length > 0) {
                        activitiesHTML = loc.activities.map(act => `
                        <div class="activity-item">
                            <span class="activity-name">🎯 ${act.name}</span>
                            <span class="activity-time">${act.time}</span>
                        </div>`).join('');
                    } else {
                        activitiesHTML = `<div class="empty-day-msg" style="padding:20px;font-size:14px;border:none;box-shadow:none;">📭 لا توجد أنشطة مسجلة لهذا اليوم</div>`;
                    }

                    html += `
                    <div class="acc-card active">
                        <button class="acc-trigger bg-zone-nadi">
                            <span>🏟️ ${loc.roomLabel}</span><span class="acc-icon">▼</span>
                        </button>
                        <div class="acc-content"><div class="zone-body">
                            <div class="location-section" style="border-right-color:${borderColor};">
                                <div class="location-title">📍 ${loc.roomLabel}</div>
                                ${activitiesHTML}
                            </div>
                        </div></div>
                    </div>`;
                });
            }

            html += `\n</div></div>`;
            return html;
        }

        async function loadAllDays() {
            const container = document.getElementById('dynamic-schedule');
            container.innerHTML = '<div style="text-align:center;padding:40px;color:#d97706;font-size:15px;font-weight:600;">⏳ جاري تحميل جدول النادي من Google Sheet...</div>';

            try {
                const allHTML = {};

                for (const day of DAYS) {
                    try {
                        const table    = await fetchDay(day.gid);
                        const locs     = parseRows(table);
                        allHTML[day.key] = buildDayHTML(locs, day.key);
                    } catch(e) {
                        console.error('Day load error:', day.key, e);
                        allHTML[day.key] = `<div id="${day.key}" class="day-content">
                            <div class="empty-day-msg">⚠️ تعذّر تحميل بيانات هذا اليوم</div>
                        </div>`;
                    }
                }

                container.innerHTML = DAYS.map(d => allHTML[d.key]).join('\n');

                initAccordion();
                buildSearchIndex();

                // فتح تاب اليوم الحالي
                const todayKey = ['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];
                const todayBtn = document.querySelector(`.day-tab[data-day="${todayKey}"]`);
                if (todayBtn) todayBtn.click();
                else document.querySelector('.day-tab')?.click();

                updateCountdown();

            } catch(err) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444;font-size:15px;font-weight:600;">❌ خطأ في تحميل البيانات. تأكد من أن الـ Sheet عام (Public)</div>';
                console.error('Sheet load error:', err);
            }
        }

        function initAccordion() {
            document.querySelectorAll('.acc-trigger').forEach(btn => {
                const newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                newBtn.addEventListener('click', function() {
                    const card    = this.closest('.acc-card');
                    const content = card.querySelector('.acc-content');
                    card.classList.toggle('active');
                    content.style.maxHeight = card.classList.contains('active')
                        ? content.scrollHeight + 'px' : '0';
                });
            });
        }

        // بناء فهرس البحث
        let searchIndex = [];
        function buildSearchIndex() {
            searchIndex = [];
            const dayLabels = { sun:'الأحد',mon:'الاثنين',tue:'الثلاثاء',wed:'الأربعاء',thu:'الخميس',fri:'الجمعة',sat:'السبت' };
            document.querySelectorAll('.day-content').forEach(dayEl => {
                const dayKey = dayEl.id;
                dayEl.querySelectorAll('.activity-item').forEach(item => {
                    const name = item.querySelector('.activity-name')?.textContent?.trim() || '';
                    const time = item.querySelector('.activity-time')?.textContent?.trim()  || '';
                    const loc  = item.closest('.location-section')?.querySelector('.location-title')?.textContent?.trim() || TARGET_ROOM;
                    if (name) searchIndex.push({ dayKey, dayLabel: dayLabels[dayKey] || dayKey, name, time, loc, el: item });
                });
            });
        }

        document.addEventListener('DOMContentLoaded', loadAllDays);

        // ===== TAB SWITCHING =====
        const dayTitles = { sun:'الأحد ☀️',mon:'الاثنين 🌙',tue:'الثلاثاء 🔥',wed:'الأربعاء 💧',thu:'الخميس 🌾',fri:'الجمعة ⛪',sat:'السبت 🎉' };
        document.addEventListener('DOMContentLoaded', () => {
            const mainTitle = document.getElementById('mainTitle');
            
            // ===== EMOJI & SOUND =====
            const dynamicEmojis = ['🏟️','⚽','🎯','🏅','🎉','✨','🌟','💫','🎊','🏆','🥳','🎶','🎵','🙏','✝️','👼','🕊️','💝'];
            const emojiContainerEl = document.getElementById('emojiContainer');
            let _audioCtx = null;
            function playChimeSound() {
                try {
                    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    let osc = _audioCtx.createOscillator(), gain = _audioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, _audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(987.77, _audioCtx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.08, _audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.005, _audioCtx.currentTime + 0.18);
                    osc.connect(gain); gain.connect(_audioCtx.destination); osc.start(); osc.stop(_audioCtx.currentTime + 0.18);
                } catch(e) {}
            }
            const _animModes = [
                { name:'rain', cls:'anim-rain', spawn:(el,i,total)=>{ el.style.left=(Math.random()*100)+'%'; el.style.top='-60px'; el.style.animationDelay=(i/total*1.2+Math.random()*0.3)+'s'; el.style.animationDuration=(1.8+Math.random()*0.8)+'s'; el.style.fontSize=(28+Math.random()*20)+'px'; } },
                { name:'wave', cls:'anim-wave', spawn:(el,i,total)=>{ el.style.left='-70px'; el.style.top=(5+Math.random()*90)+'%'; el.style.animationDelay=(i*0.06)+'s'; el.style.animationDuration=(2.2+Math.random()*1)+'s'; el.style.fontSize=(28+Math.random()*18)+'px'; } },
                { name:'burst', cls:'anim-burst', spawn:(el,i,total)=>{ const angle=(i/total)*360,dist=120+Math.random()*250,rad=angle*Math.PI/180; el.style.left='50%'; el.style.top='50%'; el.style.setProperty('--bx','0px'); el.style.setProperty('--by','0px'); el.style.setProperty('--ex',(Math.cos(rad)*dist)+'px'); el.style.setProperty('--ey',(Math.sin(rad)*dist)+'px'); el.style.animationDelay=(Math.random()*0.3)+'s'; el.style.animationDuration=(1.6+Math.random()*0.8)+'s'; el.style.fontSize=(24+Math.random()*22)+'px'; } },
                { name:'spiral', cls:'anim-spiral', spawn:(el,i,total)=>{ el.style.left=(10+Math.random()*80)+'%'; el.style.top='90%'; el.style.animationDelay=(i*0.05+Math.random()*0.2)+'s'; el.style.animationDuration=(2.5+Math.random()*1)+'s'; el.style.fontSize=(26+Math.random()*18)+'px'; } },
                { name:'wind', cls:'anim-wind', spawn:(el,i,total)=>{ el.style.right='-70px'; el.style.left='auto'; el.style.top=(5+Math.random()*90)+'%'; el.style.animationDelay=(i*0.06)+'s'; el.style.animationDuration=(2.2+Math.random()*0.8)+'s'; el.style.fontSize=(28+Math.random()*18)+'px'; } },
                { name:'meteor', cls:'anim-meteor', spawn:(el,i,total)=>{ el.style.left=(Math.random()*80)+'%'; el.style.top=(Math.random()*30)+'%'; el.style.animationDelay=(i*0.04+Math.random()*0.3)+'s'; el.style.animationDuration=(1.4+Math.random()*0.6)+'s'; el.style.fontSize=(26+Math.random()*16)+'px'; } }
            ];
            let _lastModeIdx = -1;
            function launchEmojiBlast() {
                if (!emojiContainerEl) return;
                emojiContainerEl.innerHTML = '';
                let ni; do { ni = Math.floor(Math.random()*_animModes.length); } while(ni === _lastModeIdx);
                _lastModeIdx = ni;
                const mode = _animModes[ni], count = mode.name==='burst'?40:35;
                for (let i=0; i<count; i++) {
                    const el = document.createElement('div');
                    el.classList.add('floating-emoji', mode.cls);
                    el.textContent = dynamicEmojis[Math.floor(Math.random()*dynamicEmojis.length)];
                    mode.spawn(el, i, count);
                    emojiContainerEl.appendChild(el);
                    el.addEventListener('animationend', ()=>el.remove());
                }
            }
            let _tabTimer = null;
            document.querySelectorAll('.day-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.day-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    const key = tab.getAttribute('data-day');
                    const content = document.getElementById(key);
                    if (content) content.classList.add('active');
                    mainTitle.textContent = '🏟️ النادي — ' + (dayTitles[key] || key);
                    clearTimeout(_tabTimer); _tabTimer = setTimeout(()=>{ playChimeSound(); launchEmojiBlast(); }, 150);
                    document.querySelectorAll('.acc-card.active .acc-content').forEach(c => {
                        c.style.maxHeight = c.scrollHeight + 'px';
                    });
                });
            });
        });

        // ===== COUNTDOWN =====
        function parseTime(str) {
            const m = str.match(/(\d+):(\d+)\s*(ص|م)/);
            if (!m) return null;
            let h = parseInt(m[1]), mn = parseInt(m[2]);
            if (m[3] === 'م' && h !== 12) h += 12;
            if (m[3] === 'ص' && h === 12) h = 0;
            return h * 60 + mn;
        }
        function updateCountdown() {
            const now = new Date();
            const nowMin = now.getHours() * 60 + now.getMinutes();
            const todayIdx = now.getDay();
            const keys = ['sun','mon','tue','wed','thu','fri','sat'];
            let nextEvent = null;
            for (let i = 0; i < 7; i++) {
                const idx = (todayIdx + i) % 7;
                const dayEl = document.getElementById(keys[idx]);
                if (!dayEl) continue;
                let earliest = null;
                dayEl.querySelectorAll('.activity-time').forEach(el => {
                    const t = parseTime(el.textContent.split('—')[0].replace('⏰','').trim());
                    if (t !== null && (earliest === null || t < earliest)) earliest = t;
                });
                if (earliest === null) continue;
                if (i === 0 && nowMin >= earliest) continue;
                const target = new Date(now);
                target.setDate(now.getDate() + i);
                target.setHours(Math.floor(earliest / 60), earliest % 60, 0, 0);
                nextEvent = { date: target, label: dayTitles[keys[idx]] || keys[idx] };
                break;
            }
            const el = document.getElementById('timerDisplay');
            if (!el) return;
            if (!nextEvent) { el.innerHTML = '<span>لا توجد فعاليات قادمة</span>'; return; }
            const diffMs  = nextEvent.date - now;
            const days    = Math.floor(diffMs / (1000*60*60*24));
            const hours   = Math.floor((diffMs % (1000*60*60*24)) / (1000*60*60));
            const minutes = Math.floor((diffMs % (1000*60*60)) / (1000*60));
            const seconds = Math.floor((diffMs % (1000*60)) / 1000);
            const timeStr = hours + ':' + String(minutes).padStart(2,'0') + ':' + String(seconds).padStart(2,'0');
            const prefix  = days > 0 ? days + ' يوم و ' + timeStr : timeStr;
            el.innerHTML  = `<span style="opacity:0.85">⏳ متبقي على ${nextEvent.label}:</span>&nbsp;<span class="countdown-timer">${prefix}</span>`;
        }
        setInterval(updateCountdown, 1000);

        // ===== SEARCH =====
        (function() {
            const input    = document.getElementById('searchBoxReal');
            const overlay  = document.getElementById('searchOverlay');
            const box      = document.getElementById('searchResultsBox');
            const closeBtn = document.getElementById('searchCloseBtn');
            if (!input) return;

            input.addEventListener('input', () => {
                const q = input.value.trim();
                if (closeBtn) closeBtn.style.opacity = q ? '0.5' : '0';
                if (!q) { overlay.style.display = 'none'; box.innerHTML = ''; return; }

                // اليوم النشط حالياً
                const activeDayKey = document.querySelector('.day-tab.active')?.getAttribute('data-day') || '';

                const allHits = searchIndex.filter(r =>
                    r.name.includes(q) || r.loc.includes(q) || r.dayLabel.includes(q)
                );

                // رتّب: اليوم النشط أول، بعدين باقي الأيام
                const hits = [
                    ...allHits.filter(r => r.dayKey === activeDayKey),
                    ...allHits.filter(r => r.dayKey !== activeDayKey)
                ].slice(0, 25);

                if (hits.length === 0) {
                    box.innerHTML = `<div class="search-no-results">😶 مفيش نتايج لـ "${q}"</div>`;
                } else {
                    let passedActive = false;
                    box.innerHTML = hits.map((r, i) => {
                        const isActive = r.dayKey === activeDayKey;
                        let sep = '';
                        if (!isActive && !passedActive && allHits.some(x => x.dayKey === activeDayKey)) {
                            sep = `<div style="padding:5px 18px;font-size:11px;font-weight:700;color:#94a3b8;background:rgba(0,0,0,0.03);border-bottom:1px solid var(--border-color);">📅 أيام أخرى</div>`;
                            passedActive = true;
                        }
                        return sep + `<div class="search-result-item" data-idx="${i}" style="${isActive ? 'border-right:3px solid #6d28d9;' : ''}">
                            <div class="sri-day-badge" style="${isActive ? 'background:rgba(109,40,217,0.18);' : ''}">${isActive ? '⭐ ' : ''}${r.dayLabel}</div>
                            <div class="sri-name">${r.name}</div>
                            <div class="sri-loc">📍 ${r.loc}</div>
                            <div class="sri-time">${r.time}</div>
                        </div>`;
                    }).join('');

                    hits.forEach((r, i) => {
                        box.querySelector(`[data-idx="${i}"]`).addEventListener('click', () => {
                            const tab = document.querySelector(`.day-tab[data-day="${r.dayKey}"]`);
                            if (tab) tab.click();
                            if (r.el) {
                                setTimeout(() => {
                                    r.el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                    r.el.style.background = 'rgba(109,40,217,0.12)';
                                    r.el.style.borderRadius = '8px';
                                    setTimeout(() => { r.el.style.background = ''; }, 1800);
                                }, 200);
                            }
                            overlay.style.display = 'none';
                            input.value = '';
                            if (closeBtn) closeBtn.style.opacity = '0';
                        });
                    });
                }
                overlay.style.display = 'block';
            });

            overlay && overlay.addEventListener('click', e => {
                if (!box.contains(e.target) && e.target !== input && e.target !== closeBtn) {
                    overlay.style.display = 'none';
                    if (input) input.value = '';
                    if (closeBtn) closeBtn.style.opacity = '0';
                }
            });
        })();

        // ===== DARK MODE =====
        document.addEventListener('DOMContentLoaded', () => {
            const toggle = document.getElementById('themeToggleSwitch');
            function applyTheme(t) {
                t === 'dark' ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark');
            }
            const saved = localStorage.getItem('user-theme');
            applyTheme(saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
            toggle?.addEventListener('click', () => {
                const isDark = document.documentElement.classList.contains('dark');
                const next = isDark ? 'light' : 'dark';
                applyTheme(next);
                localStorage.setItem('user-theme', next);
            });
        });

        // ===== NOTES =====
        document.addEventListener('DOMContentLoaded', () => {
            const area = document.getElementById('personalNotes');
            const hint = document.getElementById('savedHint');
            const KEY  = 'nadi-personal-notes';
            if (!area) return;
            const saved = localStorage.getItem(KEY);
            if (saved) area.value = saved;
            let saveTimer;
            area.addEventListener('input', () => {
                clearTimeout(saveTimer);
                saveTimer = setTimeout(() => {
                    localStorage.setItem(KEY, area.value);
                    if (hint) { hint.textContent = '✅ تم الحفظ تلقائياً'; setTimeout(() => hint.textContent = '', 2000); }
                }, 600);
            });
        });

        // ===== SHARE =====
        document.addEventListener('DOMContentLoaded', () => {
            const btn  = document.getElementById('shareBtn');
            const menu = document.getElementById('shareMenu');
            const wa   = document.getElementById('waShareBtn');
            const cp   = document.getElementById('copyShareBtn');
            if (!btn) return;
            btn.addEventListener('click', e => { e.stopPropagation(); menu.classList.toggle('open'); });
            document.addEventListener('click', () => menu.classList.remove('open'));
            wa?.addEventListener('click', () => {
                const text = `🏟️ جدول النادي - مهرجان الكرازة 2026\n${location.href}`;
                window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
            });
            cp?.addEventListener('click', () => {
                navigator.clipboard.writeText(location.href).then(() => {
                    cp.textContent = '✅ تم النسخ!';
                    setTimeout(() => cp.textContent = '🔗 انسخ الرابط', 2000);
                });
            });
        });

        // ===== PULL TO REFRESH =====
        (function() {
            const THRESHOLD = 80;
            let startY = 0, pulling = false, refreshing = false;
            const indicator = document.getElementById('ptr-indicator');
            const ptrIcon   = document.getElementById('ptr-icon');
            const ptrLabel  = document.getElementById('ptr-label');
            const ptrSpinner= document.getElementById('ptr-spinner');
            function setPull(dy) {
                const h = Math.min(dy, 110);
                indicator.style.height = h + 'px';
                document.body.style.transform = 'translateY(' + h + 'px)';
                ptrIcon.style.transform = 'rotate(' + Math.min((h/THRESHOLD)*180,180) + 'deg)';
                ptrLabel.textContent = h >= THRESHOLD ? 'رفع إيدك للتحديث!' : 'اسحب للتحديث';
                ptrIcon.style.color = h >= THRESHOLD ? '#fde68a' : 'white';
            }
            function doRefresh() {
                refreshing = true;
                indicator.style.height = '52px';
                document.body.style.transition = 'transform 0.3s ease';
                document.body.style.transform  = 'translateY(52px)';
                ptrIcon.style.display   = 'none';
                ptrSpinner.style.display = 'block';
                ptrLabel.textContent    = 'جاري التحديث...';
                setTimeout(() => {
                    document.body.style.transform  = 'translateY(0)';
                    indicator.style.transition      = 'height 0.3s ease';
                    indicator.style.height          = '0px';
                    ptrSpinner.style.display = 'none';
                    ptrIcon.style.display    = 'block';
                    ptrIcon.style.transform  = 'rotate(0deg)';
                    ptrIcon.style.color      = 'white';
                    ptrLabel.textContent     = 'اسحب للتحديث';
                    setTimeout(() => {
                        indicator.style.transition = ''; document.body.style.transition = '';
                        refreshing = false; location.reload();
                    }, 320);
                }, 1000);
            }
            function cancelPull() {
                document.body.style.transition = 'transform 0.25s ease';
                indicator.style.transition = 'height 0.25s ease';
                setPull(0);
                setTimeout(() => { document.body.style.transition = ''; indicator.style.transition = ''; }, 260);
                pulling = false;
            }
            document.addEventListener('touchstart', e => { if (refreshing || window.scrollY > 0) return; startY = e.touches[0].clientY; pulling = true; }, { passive:true });
            document.addEventListener('touchmove',  e => { if (!pulling || refreshing) return; const dy = e.touches[0].clientY - startY; if (dy > 0) setPull(dy); }, { passive:true });
            document.addEventListener('touchend',   e => { if (!pulling) return; pulling = false; const dy = e.changedTouches[0].clientY - startY; if (dy >= THRESHOLD) doRefresh(); else cancelPull(); });
        })();

    })();
    </script>

    (function() {
        var AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        var _ctx = null;
        function getCtx() {
            if (!_ctx) _ctx = new AudioContext();
            if (_ctx.state === 'suspended') _ctx.resume();
            return _ctx;
        }

        // 1. جرس كنيسة كبير
        function playChurchBell() {
            var ctx = getCtx(), t = ctx.currentTime;
            [[523,1],[784,0.7],[1047,0.4]].forEach(function(p){
                var o=ctx.createOscillator(),g=ctx.createGain();
                o.type='sine'; o.frequency.setValueAtTime(p[0],t);
                o.frequency.exponentialRampToValueAtTime(p[0]*0.97,t+2);
                g.gain.setValueAtTime(p[1]*0.25,t);
                g.gain.exponentialRampToValueAtTime(0.001,t+2.5);
                o.connect(g); g.connect(ctx.destination);
                o.start(t); o.stop(t+2.5);
            });
        }

        // 2. ناي قبطي
        function playCopticNey() {
            var ctx = getCtx(), t = ctx.currentTime;
            var o=ctx.createOscillator(),vib=ctx.createOscillator(),vg=ctx.createGain(),mg=ctx.createGain();
            o.type='sine'; o.frequency.setValueAtTime(392,t);
            vib.type='sine'; vib.frequency.setValueAtTime(5.5,t);
            vg.gain.setValueAtTime(0,t); vg.gain.linearRampToValueAtTime(7,t+0.3);
            vib.connect(vg); vg.connect(o.frequency);
            mg.gain.setValueAtTime(0,t); mg.gain.linearRampToValueAtTime(0.3,t+0.07);
            mg.gain.setValueAtTime(0.3,t+0.8); mg.gain.exponentialRampToValueAtTime(0.001,t+1.8);
            o.connect(mg); mg.connect(ctx.destination);
            o.start(t); vib.start(t); o.stop(t+1.8); vib.stop(t+1.8);
        }

        // 3. جرس صغير مضيء
        function playSmallBell() {
            var ctx = getCtx(), t = ctx.currentTime;
            [[880,1],[1318,0.6],[1760,0.3]].forEach(function(p){
                var o=ctx.createOscillator(),g=ctx.createGain();
                o.type='triangle'; o.frequency.setValueAtTime(p[0],t);
                g.gain.setValueAtTime(p[1]*0.25,t);
                g.gain.exponentialRampToValueAtTime(0.001,t+1.5);
                o.connect(g); g.connect(ctx.destination);
                o.start(t); o.stop(t+1.5);
            });
        }

        // 4. نغمة مقدسية — أورج
        function playHolyOrgan() {
            var ctx = getCtx(), t = ctx.currentTime;
            [261.6,392,523.2,659].forEach(function(f,i){
                var o=ctx.createOscillator(),g=ctx.createGain();
                o.type='sine'; o.frequency.setValueAtTime(f,t);
                g.gain.setValueAtTime(0,t);
                g.gain.linearRampToValueAtTime(0.15,t+0.06+i*0.06);
                g.gain.setValueAtTime(0.15,t+0.6);
                g.gain.exponentialRampToValueAtTime(0.001,t+2.2);
                o.connect(g); g.connect(ctx.destination);
                o.start(t); o.stop(t+2.2);
            });
        }

        // 5. ترتيل — هاليلويا (نغمات متصاعدة)
        function playHallelujah() {
            var ctx = getCtx(), t = ctx.currentTime;
            var notes = [392,440,494,523,587,659,698,784];
            notes.forEach(function(f,i){
                var o=ctx.createOscillator(),g=ctx.createGain();
                o.type='sine'; o.frequency.setValueAtTime(f,t+i*0.1);
                g.gain.setValueAtTime(0,t+i*0.1);
                g.gain.linearRampToValueAtTime(0.18,t+i*0.1+0.04);
                g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.5);
                o.connect(g); g.connect(ctx.destination);
                o.start(t+i*0.1); o.stop(t+i*0.1+0.5);
            });
        }

        // 6. بخور — نغمة صوفية عميقة (drone)
        function playIncenseDrone() {
            var ctx = getCtx(), t = ctx.currentTime;
            [[110,0.18],[165,0.1],[220,0.07],[330,0.05]].forEach(function(p){
                var o=ctx.createOscillator(),g=ctx.createGain();
                o.type='sine'; o.frequency.setValueAtTime(p[0],t);
                var lfo=ctx.createOscillator(),lg=ctx.createGain();
                lfo.type='sine'; lfo.frequency.setValueAtTime(0.8,t);
                lg.gain.setValueAtTime(1.5,t);
                lfo.connect(lg); lg.connect(o.frequency);
                g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(p[1],t+0.3);
                g.gain.setValueAtTime(p[1],t+1.5); g.gain.exponentialRampToValueAtTime(0.001,t+2.8);
                o.connect(g); g.connect(ctx.destination);
                o.start(t); lfo.start(t); o.stop(t+2.8); lfo.stop(t+2.8);
            });
        }

        // 7. مزمار — تسبحة قبطية (pentatonic descending)
        function playCopticPraise() {
            var ctx = getCtx(), t = ctx.currentTime;
            var notes = [659,587,523,440,392,440,523];
            notes.forEach(function(f,i){
                var o=ctx.createOscillator(),vib=ctx.createOscillator(),vg=ctx.createGain(),g=ctx.createGain();
                o.type='sine'; o.frequency.setValueAtTime(f,t+i*0.13);
                vib.type='sine'; vib.frequency.setValueAtTime(6,t+i*0.13);
                vg.gain.setValueAtTime(4,t+i*0.13);
                vib.connect(vg); vg.connect(o.frequency);
                g.gain.setValueAtTime(0,t+i*0.13);
                g.gain.linearRampToValueAtTime(0.2,t+i*0.13+0.03);
                g.gain.exponentialRampToValueAtTime(0.001,t+i*0.13+0.35);
                o.connect(g); g.connect(ctx.destination);
                o.start(t+i*0.13); vib.start(t+i*0.13);
                o.stop(t+i*0.13+0.35); vib.stop(t+i*0.13+0.35);
            });
        }

        var sounds = [
            playChurchBell,
            playCopticNey,
            playSmallBell,
            playHolyOrgan,
            playHallelujah,
            playIncenseDrone,
            playCopticPraise
        ];

        function playRandom() {
            try { sounds[Math.floor(Math.random() * sounds.length)](); } catch(e) {}
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.day-tab').forEach(function(btn) {
                btn.addEventListener('click', playRandom);
            });
        });
    })();
    </script>

<script>
(function() {
    var logo = document.getElementById("angel-logo");
    var glow = document.getElementById("angel-glow");
    var rays = document.getElementById("angel-rays");
    var canvas = document.getElementById("angel-fireworks");
    if (!canvas || !logo) return;
    var ctx = canvas.getContext("2d");
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    function getLogoCenterOnScreen() {
        var rect = logo.getBoundingClientRect();
        return { cx: rect.left + rect.width/2, cy: rect.top + rect.height/2, r: rect.width/2 };
    }
    var particles = [];
    function spawnParticles() {
        var colors = ["#ffe066","#ffd700","#fff7a1","#ffb300","#ffffff","#ffec6e","#ff9f00","#fffde0","#ffcc00","#fff0a0","#fffbe6","#ffc200"];
        var pos = getLogoCenterOnScreen(), count = 300;
        for (var i = 0; i < count; i++) {
            var angle = (Math.PI*2/count)*i + (Math.random()-0.5)*0.15;
            var speed = 3 + Math.random()*8, size = 2.5 + Math.random()*5, life = 0.8 + Math.random()*0.7;
            particles.push({ x: pos.cx + Math.cos(angle)*pos.r, y: pos.cy + Math.sin(angle)*pos.r,
                vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, size: size, life: life, maxLife: life,
                color: colors[Math.floor(Math.random()*colors.length)], tail: [],
                type: Math.random()<0.5?"spark":"dot" });
        }
    }
    var animId = null;
    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var alive = false;
        for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            if (p.life <= 0) continue;
            alive = true;
            p.tail.unshift({x:p.x, y:p.y});
            if (p.tail.length > 8) p.tail.pop();
            p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.vx *= 0.97; p.vy *= 0.97; p.life -= 0.022;
            var alpha = Math.max(0, p.life/p.maxLife);
            if (p.type==="spark" && p.tail.length > 1) {
                for (var t = 0; t < p.tail.length-1; t++) {
                    var ta = alpha*(1-t/p.tail.length)*0.6;
                    ctx.beginPath(); ctx.moveTo(p.tail[t].x, p.tail[t].y); ctx.lineTo(p.tail[t+1].x, p.tail[t+1].y);
                    ctx.strokeStyle = p.color; ctx.globalAlpha = ta; ctx.lineWidth = p.size*(1-t/p.tail.length)*0.5; ctx.stroke();
                }
            }
            ctx.globalAlpha = alpha; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0, p.size*(p.life/p.maxLife)), 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        if (alive) animId = requestAnimationFrame(animateParticles);
        else { particles = []; ctx.clearRect(0,0,canvas.width,canvas.height); }
    }
    function triggerGlow() {
        var dur = 3000;
        glow.style.animation = "none"; rays.style.animation = "none"; logo.style.animation = "none";
        glow.offsetHeight;
        glow.style.animation = "glowFade "+dur+"ms ease-out forwards";
        rays.style.animation = "rayBurst "+dur+"ms ease-out forwards";
        logo.style.animation = "logoBright2 "+dur+"ms ease-out forwards";
        if (animId) cancelAnimationFrame(animId);
        particles = []; spawnParticles(); animateParticles();
    }
    logo.addEventListener("click", triggerGlow);
    logo.addEventListener("touchstart", function(e) { e.preventDefault(); triggerGlow(); }, {passive:false});
    setTimeout(triggerGlow, 800);
    var interval = 7000;
    var autoTimer = setInterval(triggerGlow, interval);
    logo.addEventListener("click", function() { clearInterval(autoTimer); autoTimer = setInterval(triggerGlow, interval); });
})();
</script>
